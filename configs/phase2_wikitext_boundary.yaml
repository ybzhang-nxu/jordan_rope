seeds: [0]
device: cuda
methods:
  - rope
  - damped_rope
  - jordan_rope

position:
  theta: 10000.0
  gamma_min: 0.0001
  init_gamma: 0.0001
  eta_max: 0.1
  init_eta: 0.0
  train_context: 512
  bounded_tau: true
  max_exponent: 30.0

lm:
  train_steps: 200
  log_every: 50
  eval_every: 200
  batch_size: 4
  eval_batches: 4
  eval_batch_size: 1
  train_sample_seed: 3701
  eval_sample_seed: 4701
  seq_len_train: 512
  eval_lengths: [512, 1024, 2048]
  lr: 0.0005
  weight_decay: 0.05
  dataset:
    name: wikitext
    subset: wikitext-2-raw-v1
    train_split: train
    eval_split: validation
    text_file: null
  model:
    d_model: 128
    n_heads: 4
    n_layers: 3
    mlp_ratio: 2
    dropout: 0.0
