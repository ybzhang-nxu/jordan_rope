seeds: [0]
device: auto
methods:
  - rope
  - damped_rope
  - direct_sum
  - jordan_rope
  - jordan_m3
  - jordan_m4
  - jordan_exact_m3_c010_eta010
  - jordan_exact_m4_c010_eta010

position:
  theta: 10000.0
  gamma_min: 0.0001
  init_gamma: 0.0001
  eta_max: 0.1
  init_eta: 0.0
  train_context: 256
  bounded_tau: true
  max_exponent: 30.0

kernel_lm:
  benchmark: high_jet_r2
  scaled_c: 0.1
  train_steps: 160
  log_every: 40
  eval_every: 80
  batch_size: 16
  eval_batches: 8
  eval_batch_size: 2
  seq_len_train: 256
  eval_lengths: [256, 512, 1024]
  data_seed: 7107
  eval_seed: 9109
  label_mode: threshold
  logit_scale: 3.0
  target_freq_index: 3
  second_freq_index: 5
  gamma: 0.0001
  model:
    d_model: 192
    n_heads: 4
    n_layers: 3
    mlp_ratio: 2
    dropout: 0.0
  lr: 0.0005
  weight_decay: 0.01
