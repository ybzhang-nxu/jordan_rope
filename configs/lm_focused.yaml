seeds: [0, 1, 2]
device: cuda
methods:
  - rope
  - alibi
  - rope_alibi
  - damped_rope
  - direct_sum
  - jordan_rope
  - jordan_eta020
  - jordan_eta050

position:
  theta: 10000.0
  gamma_min: 0.0001
  init_gamma: 0.0001
  eta_max: 0.1
  init_eta: 0.0
  train_context: 1024
  bounded_tau: true
  max_exponent: 30.0

lm:
  train_steps: 1000
  log_every: 100
  eval_every: 500
  batch_size: 4
  eval_batches: 16
  eval_batch_size: 1
  train_sample_seed: 1701
  eval_sample_seed: 20270505
  seq_len_train: 1024
  eval_lengths: [1024, 2048, 4096, 8192]
  lr: 0.0003
  weight_decay: 0.1
  dataset:
    name: wikitext
    subset: wikitext-103-raw-v1
    train_split: train
    eval_split: validation
    text_file: null
  model:
    d_model: 384
    n_heads: 6
    n_layers: 6
    mlp_ratio: 4
    dropout: 0.0
