seeds: [0, 1, 2]
device: cuda
methods:
  - nope
  - rope
  - alibi
  - rope_alibi
  - damped_rope
  - direct_sum
  - jordan_rope
  - jordan_raw_tau

position:
  theta: 10000.0
  gamma_min: 0.0001
  init_gamma: 0.0001
  eta_max: 0.1
  init_eta: 0.0
  train_context: 512
  bounded_tau: true
  max_exponent: 30.0

signal:
  benchmarks: [seasonal_trend, damped_wave]
  train_steps: 300
  log_every: 50
  eval_every: 300
  batch_size: 8
  eval_batches: 4
  eval_batch_size: 1
  seq_len_train: 512
  eval_lengths: [512, 1024, 2048, 4096, 8192]
  input_dim: 1
  output_dim: 1
  lr: 0.0005
  weight_decay: 0.01
  ridge: 0.0001
  gamma: 0.0001
  target_freq_index: 3
  second_freq_index: 5
  drift_relative_eps: 0.00005
  model:
    d_model: 128
    n_heads: 4
    n_layers: 3
    mlp_ratio: 2
    dropout: 0.0
