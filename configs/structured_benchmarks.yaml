seeds: [0, 1, 2]
device: auto
methods:
  - nope
  - rope
  - alibi
  - rope_alibi
  - damped_rope
  - real_jordan
  - direct_sum
  - jordan_rope
  - jordan_no_gamma
  - jordan_raw_tau
  - jordan_m3

position:
  theta: 10000.0
  gamma_min: 0.0001
  init_gamma: 0.0001
  eta_max: 0.1
  init_eta: 0.0
  train_context: 1024
  bounded_tau: true
  max_exponent: 30.0

benchmarks:
  train_context: 1024
  eval_contexts: [1024, 2048, 4096, 8192]
  num_freqs: 16
  head_dim: 64
  target_freq_index: 3
  second_freq_index: 5
  ridge: 0.0001
  train_points: 1024
  gamma: 0.0001
  drift_relative_eps: 0.00005
