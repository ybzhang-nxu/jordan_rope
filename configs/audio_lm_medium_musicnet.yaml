seeds: [0, 1]
device: cuda
methods:
  - rope
  - damped_rope
  - direct_sum
  - jordan_rope
  - jordan_m3
  - jordan_m4
  - jordan_exact_m3_c010_eta100_eta1
  - jordan_exact_m4_c010_eta100_eta1

position:
  theta: 10000.0
  gamma_min: 0.0001
  init_gamma: 0.0001
  eta_max: 0.1
  init_eta: 0.0
  train_context: 256
  bounded_tau: true
  max_exponent: 30.0

lm:
  train_steps: 300
  log_every: 50
  eval_every: 150
  batch_size: 32
  eval_batches: 16
  eval_batch_size: 4
  train_sample_seed: 1701
  eval_sample_seed: 20270506
  seq_len_train: 256
  eval_lengths: [256, 512, 1024]
  lr: 0.0006
  weight_decay: 0.05
  dataset:
    name: local
    subset: musicnet_mel
    train_split: train
    eval_split: eval
    train_text_file: data/processed/audio_lm_smoke/musicnet_mel/train.bin
    eval_text_file: data/processed/audio_lm_smoke/musicnet_mel/eval.bin
  model:
    d_model: 192
    n_heads: 4
    n_layers: 3
    mlp_ratio: 2
    dropout: 0.0
