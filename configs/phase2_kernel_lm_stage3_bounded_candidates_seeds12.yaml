seeds: [1, 2]
device: cuda
methods:
  - jordan_rope
  - jordan_eta002
  - jordan_eta010

position:
  theta: 10000.0
  gamma_min: 0.0001
  init_gamma: 0.0001
  eta_max: 0.1
  init_eta: 0.0
  train_context: 1024
  bounded_tau: true
  max_exponent: 30.0

kernel_lm:
  benchmark: mixed_raw
  train_steps: 300
  log_every: 50
  eval_every: 300
  batch_size: 16
  eval_batches: 8
  eval_batch_size: 1
  seq_len_train: 1024
  eval_lengths: [1024, 2048, 4096, 8192]
  data_seed: 7229
  eval_seed: 9337
  label_mode: threshold
  logit_scale: 3.0
  target_freq_index: 3
  second_freq_index: 5
  gamma: 0.0001
  model:
    d_model: 128
    n_heads: 4
    n_layers: 3
    mlp_ratio: 2
    dropout: 0.0
  lr: 0.0005
  weight_decay: 0.01
